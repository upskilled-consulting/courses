<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // On github.io (no custom domain) the repo name is the first path segment,
    // so index.html lives at /reponame/ not /.
    // On a custom domain, index.html lives at /.
    var base = window.location.hostname.endsWith('.github.io')
      ? '/' + window.location.pathname.split('/')[1] + '/'
      : '/';
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(base + '?r=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
