<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // index.html lives at the repo root, which may be a sub-path of the domain
    // (e.g. /courses/ on upskilled.consulting). Extract the first path segment as
    // the base so the redirect always lands on the right index.html.
    var seg = window.location.pathname.split('/')[1];
    var base = seg ? '/' + seg + '/' : '/';
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(base + '?r=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
